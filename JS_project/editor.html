<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./styles_editor.css">
    <title>JS Car track builder</title>
</head>
<body>
        <header>
            <h1>Car Track Builder</h1>
        </header>
        <main>

                <div>
                    <div id="color-selection">
                        <div class="color green"><p>Grass</p></div>
                        <div class="color grey"><p>Road</p></div>
                        <div class="color blue"><p>Water</p></div>
                        <div class="color yellow"><p>Field</p></div>
                    </div>

                    <div id="array-grid">

                    </div>

                    <h2>Current track:</h2>
                    <h2 id="current-track-text"></h2>
                </div>

                <div id="confirm-section">
                    <button id="save-button">Save map</button>
                </div>
        </main>

        <script src="src/modules/script.js" type="module"></script>
</body>
</html>
